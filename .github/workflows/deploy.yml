name: Deploy to FTP

on:
  push:
    branches: [main]
    paths: [html/**]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          cd html
          find . -type f ! -name '.DS_Store' | while read file; do
            dir=$(dirname "$file" | sed 's|^\./||')
            if [ "$dir" = "." ]; then
              curl -s --ftp-pasv --ftp-create-dirs -T "$file" "ftp://${FTP_HOST}/httpdocs/" -u "${FTP_USER}:${FTP_PASS}"
            else
              curl -s --ftp-pasv --ftp-create-dirs -T "$file" "ftp://${FTP_HOST}/httpdocs/${dir}/" -u "${FTP_USER}:${FTP_PASS}"
            fi
            echo "Uploaded: $file"
          done
          echo "Deploy complete. Verifying..."
          curl -s --list-only --ftp-pasv "ftp://${FTP_HOST}/httpdocs/" -u "${FTP_USER}:${FTP_PASS}"
