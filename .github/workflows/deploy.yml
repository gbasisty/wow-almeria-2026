name: Deploy to FTP

on:
  push:
    branches: [main]
    paths: [html/**]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -e "
            set ftp:ssl-allow no;
            set ftp:passive-mode yes;
            set net:timeout 10;
            set net:max-retries 3;
            mirror --reverse --delete --verbose --parallel=2 ./html/ /httpdocs/;
            quit;
          " -u "${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}" "ftp://${{ secrets.FTP_HOST }}"
