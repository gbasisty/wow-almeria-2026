name: Deploy to FTP

on:
  push:
    branches: [main]
    paths: [html/**]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -e "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            set ftp:passive-mode yes;
            mirror --reverse --delete --verbose ./html/ /httpdocs/;
            quit;
          " -u "${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}" "${{ secrets.FTP_HOST }}"
